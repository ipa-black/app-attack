<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP ATTACK</title>
    <style>
        /* الستايل الخاص بك (بدون تغيير) */
        :root {
            --bg-color: #e6f2ed;
            --card-bg: #ffffff;
            --primary-color: #10b981;
            --text-color: #0f291e;
            --title-color: #0a1f16;
            --shadow-color: rgba(16, 185, 129, 0.25);
            --border-color: #bfe3d5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a1410;
                --card-bg: #11241c;
                --primary-color: #00ff88;
                --text-color: #e0ffe8;
                --title-color: #00ff88;
                --shadow-color: rgba(0, 255, 136, 0.15);
                --border-color: #1c3a2d;
            }
        }

        body {
            margin: 0; font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        header { text-align: center; padding: 3rem 0 1rem 0; }
        header h1 {
            font-size: 2.8rem; font-weight: 900; margin: 0;
            color: var(--title-color); letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 0 20px var(--shadow-color);
        }

        .slider-container {
            display: flex; overflow-x: auto; gap: 2.5rem; padding: 2rem;
            scroll-snap-type: x mandatory; scrollbar-width: none;
        }
        .slider-container::-webkit-scrollbar { display: none; }

        .app-card {
            flex: 0 0 auto; width: 260px; height: 380px;
            background-color: var(--card-bg); border-radius: 130px;
            box-shadow: 0 15px 35px var(--shadow-color);
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 2rem 1rem;
            scroll-snap-align: center; transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
        }
        .app-card:hover {
            transform: translateY(-10px); box-shadow: 0 20px 45px var(--shadow-color);
        }

        .app-card img {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            box-shadow: 0 8px 25px var(--shadow-color); margin-top: 10px;
            border: 3px solid var(--primary-color);
        }

        .app-card h2 { font-size: 1.3rem; margin: 0; text-align: center; font-weight: 800; }

        .app-card button {
            background-color: var(--primary-color); color: #000;
            border: none; padding: 1rem 2.5rem; border-radius: 50px;
            font-size: 1.1rem; font-weight: 900; cursor: pointer;
            transition: all 0.2s; margin-bottom: 10px;
            box-shadow: 0 5px 20px var(--shadow-color); text-transform: uppercase;
        }
        .app-card button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <header><h1>APP ATTACK</h1></header>
    <main>
        <div id="apps-slider" class="slider-container">
            <div style="width: 100%; text-align: center; font-weight: bold; color: var(--primary-color);">جاري تحميل التطبيقات...</div>
        </div>
    </main>

    <script>
        const STORE_JSON_URL = 'Store.json'; 

        async function loadApps() {
            try {
                const response = await fetch(`${STORE_JSON_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('فشل تحميل البيانات');
                const apps = await response.json();
                const slider = document.getElementById('apps-slider');
                slider.innerHTML = ''; 

                apps.forEach(app => {
                    const card = document.createElement('div');
                    card.className = 'app-card';
                    
                    // 1. بناء الرابط الخاص بـ Vercel
                    const vercelApiUrl = `${window.location.origin}/api/plist?name=${encodeURIComponent(app.name)}&bundleId=${encodeURIComponent(app.bundleId)}&version=${encodeURIComponent(app.version || '1.0')}&ipaUrl=${encodeURIComponent(app.signedIpaUrl)}&iconUrl=${encodeURIComponent(app.iconUrl)}&ext=.plist`;

                    // 2. السر هنا: تشفير الرابط بأكمله مرة أخرى حتى لا يعتبر متصفح الآيفون علامات (&) جزءاً من بروتوكول التثبيت
                    const fullyEncodedUrl = encodeURIComponent(vercelApiUrl);

                    card.innerHTML = `
                        <img src="${app.iconUrl}" alt="صورة ${app.name}" loading="lazy">
                        <h2>${app.name}</h2>
                        <button onclick="installApp('${fullyEncodedUrl}')">تنزيل</button>
                    `;
                    slider.appendChild(card);
                });
            } catch (error) {
                document.getElementById('apps-slider').innerHTML = '<div style="text-align: center; width: 100%; color: red;">تعذر تحميل التطبيقات.</div>';
            }
        }

        window.installApp = function(encodedPlistUrl) {
            // توجيه المتصفح المباشر لطلب التثبيت (بدون iframe)
            window.location.href = `itms-services://?action=download-manifest&url=${encodedPlistUrl}`;
            
            // تأخير 900 ملي ثانية قبل الانتقال للتليجرام
            setTimeout(() => { 
                window.location.href = "https://t.me/hl00ss"; 
            }, 900);
        };

        document.addEventListener('DOMContentLoaded', loadApps);
    </script>
</body>
</html>
