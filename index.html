<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جاري التحميل...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        /* تأثيرات العرض */
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .swipe-x-view { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 16px; padding-bottom: 10px; }
        .swipe-x-view > div { min-width: 200px; scroll-snap-align: center; }
        .swipe-y-view { display: flex; flex-direction: column; gap: 16px; }

        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* إخفاء شريط التمرير للسحب */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="glass px-6 py-4 flex justify-center items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold tracking-wide" id="navTitle">الرئيسية</h1>
    </nav>

    <div id="store-content" class="px-4 mt-6 max-w-5xl mx-auto">
        </div>

    <script>
        fetch(`https://raw.githubusercontent.com/api-black/app-attack/main/store.json?v=${new Date().getTime()}`)
            .then(res => res.json())
            .then(data => {
                document.title = data.settings.siteTitle;
                
                const contentDiv = document.getElementById('store-content');
                const viewModeClass = `${data.settings.viewMode}-view`; // grid-view, swipe-x-view, swipe-y-view

                // إنشاء الأقسام
                data.settings.categories.forEach(category => {
                    // تصفية التطبيقات التي تتبع هذا القسم وغير مخفية
                    const categoryApps = data.apps.filter(app => app.category === category && !app.isHidden);
                    
                    if (categoryApps.length > 0) {
                        const sectionHtml = `
                            <div class="mb-8">
                                <h2 class="text-xl font-bold mb-4 text-blue-400 flex items-center gap-2">
                                    <span class="w-2 h-6 bg-blue-500 rounded"></span> ${category}
                                </h2>
                                <div class="${viewModeClass}">
                                    ${categoryApps.map(app => {
                                        const manifestQuery = `ipa=${encodeURIComponent(app.ipaUrl)}&bundle=${encodeURIComponent(app.bundleId)}&title=${encodeURIComponent(app.appName)}`;
                                        const manifestUrl = `${window.location.origin}/api/manifest?${manifestQuery}`;
                                        const installUrl = `itms-services://?action=download-manifest&url=${encodeURIComponent(manifestUrl)}`;

                                        return `
                                        <div class="glass p-4 rounded-2xl flex flex-col items-center text-center">
                                            <img src="${app.appIcon}" class="w-20 h-20 rounded-2xl object-cover mb-3 shadow-lg">
                                            <h3 class="text-md font-bold mb-1 truncate w-full">${app.appName}</h3>
                                            <p class="text-[10px] text-slate-400 font-mono mb-4 bg-slate-800 px-2 py-1 rounded truncate w-full">${app.bundleId}</p>
                                            <a href="${installUrl}" class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-2 rounded-xl mt-auto">تثبيت</a>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>
                        `;
                        contentDiv.innerHTML += sectionHtml;
                    }
                });
            });
    </script>
</body>
</html>
