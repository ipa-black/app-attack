<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATTACK STORE</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --primary: #007aff; --text: #1c1c1e; --border: #e5e5ea; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1c1c1e; --primary: #0a84ff; --text: #f2f2f7; --border: #38383a; } }
        
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; direction: rtl; -webkit-tap-highlight-color: transparent; }
        .header { background: var(--card); padding: 20px 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; text-align: center; box-shadow: 0 1px 5px rgba(0,0,0,0.03); }
        .header h1 { margin: 0; font-size: 1.4rem; font-weight: 700; }
        
        .container { max-width: 650px; margin: 0 auto; padding: 15px; }
        .app-card { background: var(--card); display: flex; align-items: center; padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.02); }
        .app-icon { width: 60px; height: 60px; border-radius: 14px; object-fit: cover; margin-left: 15px; border: 1px solid var(--border); }
        .app-details { flex: 1; overflow: hidden; }
        .app-details h2 { margin: 0; font-size: 1.1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-details p { margin: 4px 0 0 0; color: gray; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btn-install { background: var(--primary); color: white; border: none; padding: 8px 18px; font-weight: bold; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: transform 0.1s; }
        .btn-install:active { transform: scale(0.95); }
        .loading { text-align: center; color: gray; padding: 40px 0; font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">
        <h1>الرئيسية</h1>
    </div>

    <div class="container">
        <div id="storeApps" class="loading">جاري مزامنة التطبيقات المتاحة... ⏳</div>
    </div>

    <script>
        // ضع رابط قناتك على التلجرام هنا
        const TELEGRAM_CHANNEL = "https://t.me/YOUR_TELEGRAM_CHANNEL"; 

        async function fetchStoreApps() {
            const container = document.getElementById('storeApps');
            try {
                const res = await fetch('/api/manage');
                if (!res.ok) throw new Error();
                const data = await res.json();
                const apps = data.apps || [];
                
                if (apps.length === 0) {
                    container.innerHTML = "<div style='text-align:center;color:gray;padding:20px;'>لا توجد تطبيقات متوفرة حالياً في المتجر.</div>";
                    return;
                }

                container.innerHTML = apps.map(app => `
                    <div class="app-card">
                        <img class="app-icon" src="${app.iconUrl}" onerror="this.src='https://via.placeholder.com/60'">
                        <div class="app-details">
                            <h2>${app.name}</h2>
                            <p>${app.bundleId}</p>
                        </div>
                        <button class="btn-install" onclick="executeInstallation('${app.name}', '${app.bundleId}', '${app.signedIpaUrl}', '${app.iconUrl}')">تثبيت</button>
                    </div>
                `).join('');

            } catch {
                container.innerHTML = "<div style='text-align:center;color:var(--primary);padding:20px;'>❌ تعذر جلب تطبيقات المتجر حالياً.</div>";
            }
        }

        function executeInstallation(name, bundleId, ipaUrl, iconUrl) {
            const host = window.location.origin;
            const manifestApi = `${host}/api/manifest`;
            
            // إضافة خدعة الخاتمة الصارمة (&ext=.plist) في نهاية الرابط تماماً لإرغام الآيفون على بدء معالجة التثبيت المستقر
            const query = `?name=${encodeURIComponent(name)}&bundleId=${bundleId}&ipaUrl=${encodeURIComponent(ipaUrl)}&iconUrl=${encodeURIComponent(iconUrl)}&ext=.plist`;
            const finalManifestUrl = manifestApi + query;
            const itmsUrl = `itms-services://?action=download-manifest&url=${encodeURIComponent(finalManifestUrl)}`;

            // تشغيل طلب التثبيت اللاسلكي عبر الإطار المخفي
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = itmsUrl;
            document.body.appendChild(iframe);

            // تأخير التحويل الخارجي لضمان بقاء جلسة الـ Installer نشطة
            setTimeout(() => {
                window.location.href = TELEGRAM_CHANNEL;
            }, 2000);
        }

        window.onload = fetchStoreApps;
    </script>
</body>
</html>
