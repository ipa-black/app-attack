name: Auto Sign & Publish App

on:
  repository_dispatch:
    types: [publish_new_app]

jobs:
  process-app:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          brew install zsign
          brew install jq

      - name: Download Raw IPA
        env:
          RAW_URL: ${{ github.event.client_payload.rawIpaUrl }}
        run: |
          CLEAN_URL=$(echo "$RAW_URL" | tr -d '[:space:]' | tr -d '"' | tr -d "'")
          curl -L -o app-raw.ipa "$CLEAN_URL"

      - name: Extract or Modify Bundle ID
        id: bundle_magic
        env:
          PROVIDED_BUNDLE: ${{ github.event.client_payload.bundleId }}
        run: |
          unzip -q app-raw.ipa -d payload_temp
          INFO_PLIST=$(find payload_temp/Payload -name "Info.plist" | head -n 1)
          
          # استخراج البندل الأصلي
          ORIGINAL_BUNDLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFO_PLIST")
          
          if [ -z "$PROVIDED_BUNDLE" ]; then
            # إذا كان الحقل فارغاً: توليد لاحقة عشوائية لمنع التعارض (تكرار التطبيق)
            RANDOM_SUFFIX=$(openssl rand -hex 2)
            FINAL_BUNDLE="${ORIGINAL_BUNDLE}.attack${RANDOM_SUFFIX}"
          else
            # إذا قمت بإدخال بندل يدوي في اللوحة، سيتم استخدامه
            FINAL_BUNDLE="$PROVIDED_BUNDLE"
          fi
          
          # حقن البندل الجديد وتغييره فعلياً داخل ملف التطبيق
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $FINAL_BUNDLE" "$INFO_PLIST"
          
          cd payload_temp
          zip -qr ../app-ready.ipa Payload
          cd ..
          rm -rf payload_temp
          
          # تصدير البندل الجديد ليتم حفظه في قاعدة البيانات Store.json
          echo "BUNDLE_ID=$FINAL_BUNDLE" >> $GITHUB_ENV

      - name: Sign IPA with zsign
        env:
          APP_NAME: ${{ github.event.client_payload.name }}
          RAW_URL: ${{ github.event.client_payload.rawIpaUrl }}
        run: |
          SAFE_NAME=$(echo "$APP_NAME" | tr -d ' ')
          # توقيع التطبيق باستخدام الشهادة
          zsign -k certs/cert.p12 -p "AppleP12.com" -m certs/profile.mobileprovision app-ready.ipa -o "${SAFE_NAME}-signed.ipa"
          
          CLEAN_URL=$(echo "$RAW_URL" | tr -d '[:space:]' | tr -d '"' | tr -d "'")
          TAG=$(echo "$CLEAN_URL" | grep -o 'download/[^/]*' | cut -d'/' -f2)
          [ -z "$TAG" ] && TAG="v1.0"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

      - name: Upload Signed IPA to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" --title "Release $TAG" --notes "Signed Apps" || true
          gh release upload "$TAG" "${SAFE_NAME}-signed.ipa" --clobber
          SIGNED_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/${SAFE_NAME}-signed.ipa"
          echo "SIGNED_URL=$SIGNED_URL" >> $GITHUB_ENV

      - name: Update Store.json database
        env:
          APP_NAME: ${{ github.event.client_payload.name }}
          ICON_URL: ${{ github.event.client_payload.iconUrl }}
        run: |
          NEW_ID=$(uuidgen)
          # حفظ البندل المعدل ($BUNDLE_ID) في الجيسون
          jq --arg id "$NEW_ID" --arg name "$APP_NAME" --arg bundle "$BUNDLE_ID" --arg icon "$ICON_URL" --arg url "$SIGNED_URL" \
             '. += [{"id": $id, "name": $name, "bundleId": $bundle, "iconUrl": $icon, "signedIpaUrl": $url}]' \
             Store.json > tmp.json && mv tmp.json Store.json

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add Store.json
          git commit -m "Update: $APP_NAME"
          git push
