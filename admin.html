<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة متجر ATTACK</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --primary: #007aff; --primary-hover: #005bb5; --text: #1c1c1e; --border: #e5e5ea; --danger: #ff3b30; --success: #34c759; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1c1c1e; --primary: #0a84ff; --primary-hover: #0060d1; --text: #f2f2f7; --border: #38383a; --danger: #ff453a; --success: #32d74b; } }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; direction: rtl; }
        .container { max-width: 700px; margin: 0 auto; padding-bottom: 40px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--card); padding: 6px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .tab { flex: 1; padding: 10px; text-align: center; background: transparent; border: none; color: var(--text); font-weight: 600; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
        .tab.active { background: var(--primary); color: white; }
        .box { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: none; border: 1px solid var(--border); }
        .box.active { display: block; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 1rem; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-group input { margin-bottom: 0; flex: 1; }
        .input-group button { width: auto; min-width: 120px; margin-bottom: 0; }
        .app-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .app-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
        .app-item img { width: 48px; height: 48px; border-radius: 10px; margin-left: 12px; object-fit: cover; }
        .app-info { flex: 1; overflow: hidden; }
        .app-info strong { display: block; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .app-info small { color: gray; font-size: 0.85rem; }
        .app-actions { display: flex; gap: 8px; }
        .app-actions button { padding: 8px 16px; margin: 0; font-size: 0.85rem; border-radius: 8px; width: auto; }
        .queue-list { margin-bottom: 15px; padding: 12px; background: var(--bg); border-radius: 10px; font-size: 0.9em; border: 1px dashed var(--primary); display: none; }
        .queue-list.active { display: block; }
        .status-msg { text-align: center; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            .input-group button { width: 100%; }
            .app-item { flex-direction: column; text-align: center; gap: 10px; padding: 15px; }
            .app-item img { margin-left: 0; }
            .app-actions { width: 100%; }
            .app-actions button { flex: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('sign')">توقيع وإضافة</button>
            <button class="tab" onclick="switchTab('manage'); loadApps();">إدارة المتجر</button>
        </div>

        <div id="sign" class="box active">
            <h3 style="margin-top:0;">تجهيز تطبيق جديد</h3>
            <input type="text" id="appName" placeholder="اسم التطبيق (مثال: انستا بلس)">
            <input type="url" id="iconUrl" placeholder="رابط الأيقونة المباشر (.png / .jpg)">
            
            <div class="input-group">
                <input type="url" id="rawIpaUrl" placeholder="رابط ملف الـ IPA المباشر">
                <button class="btn-secondary" onclick="document.getElementById('ipaFile').click()" id="uploadBtn">📂 رفع ملف</button>
                <input type="file" id="ipaFile" accept=".ipa" style="display: none;" onchange="uploadFile(this)">
            </div>
            <div id="uploadStatus" class="status-msg" style="color: var(--primary);"></div>

            <input type="text" id="bundleId" placeholder="البندل آيدي (اتركه فارغاً للافتراضي)">
            <div class="queue-list" id="queueList"></div>
            <button class="btn-secondary" onclick="addToQueue()" id="queueBtn">+ إضافة لقائمة الانتظار</button>
            
            <hr style="border: 0; height: 1px; background: var(--border); margin: 25px 0;">
            <input type="password" id="adminPassword" placeholder="كلمة المرور الإدارية" style="border-right: 4px solid var(--danger);">
            <button class="btn-primary" onclick="startProcessing()" id="processBtn">🚀 بدء التوقيع والنشر</button>
            <div id="signStatus" class="status-msg"></div>
        </div>

        <div id="manage" class="box">
            <h3 style="margin-top:0;">التطبيقات المنشورة في المتجر</h3>
            <input type="password" id="managePassword" placeholder="كلمة المرور لتأكيد التغييرات" style="border-right: 4px solid var(--danger);">
            <div id="manageStatus" class="status-msg"></div>
            <div class="app-list" id="appsContainer"></div>
        </div>
    </div>

    <script>
        let appQueue = [], currentApps = [], currentSha = '';
        const cleanUrl = (url) => url.replace(/\s+/g, '').trim();

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        async function uploadFile(input) {
            const file = input.files[0]; if (!file) return;
            const status = document.getElementById('uploadStatus');
            const btn = document.getElementById('uploadBtn');
            
            status.style.color = "var(--text)";
            status.innerText = `⏳ جاري رفع (${(file.size/1024/1024).toFixed(1)} MB)... يرجى عدم إغلاق الصفحة.`;
            btn.disabled = true;

            try {
                const formData = new FormData(); formData.append('file', file);
                const res = await fetch('https://tmpfiles.org/api/v1/upload', { method: 'POST', body: formData });
                if (!res.ok) throw new Error("السيرفر مشغول حالياً.");
                const data = await res.json();
                
                if (data.status === "success") {
                    document.getElementById('rawIpaUrl').value = data.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                    status.style.color = "var(--success)"; status.innerText = "✅ اكتمل الرفع بنجاح!";
                } else throw new Error("فشل معالجة الملف.");
            } catch (e) {
                status.style.color = "var(--danger)"; status.innerText = `❌ خطأ: ${e.message}`;
            } finally { btn.disabled = false; input.value = ''; }
        }

        function addToQueue() {
            const name = document.getElementById('appName').value.trim();
            const ipa = document.getElementById('rawIpaUrl').value;
            if(!name || !ipa) return alert("الاسم ورابط الـ IPA مطلوبان.");

            appQueue.push({
                name: name,
                iconUrl: cleanUrl(document.getElementById('iconUrl').value) || 'https://via.placeholder.com/150',
                rawIpaUrl: cleanUrl(ipa),
                bundleId: cleanUrl(document.getElementById('bundleId').value)
            });

            document.getElementById('appName').value = ''; document.getElementById('iconUrl').value = '';
            document.getElementById('rawIpaUrl').value = ''; document.getElementById('bundleId').value = '';
            updateQueueUI();
        }

        function updateQueueUI() {
            const q = document.getElementById('queueList');
            if(appQueue.length === 0) { q.classList.remove('active'); q.innerHTML = ""; }
            else {
                q.classList.add('active');
                q.innerHTML = `<strong>قائمة الانتظار (${appQueue.length}):</strong><br>` + 
                              appQueue.map((a, i) => `• ${a.name} <span style="color:var(--danger);cursor:pointer;float:left;" onclick="appQueue.splice(${i},1);updateQueueUI();">✖</span>`).join('<br>');
            }
        }

        async function startProcessing() {
            const pass = document.getElementById('adminPassword').value;
            const status = document.getElementById('signStatus');
            const btn = document.getElementById('processBtn');
            
            if(document.getElementById('appName').value && document.getElementById('rawIpaUrl').value) addToQueue();
            if(appQueue.length === 0) return alert("لا توجد تطبيقات في القائمة.");
            if(!pass) return alert("كلمة المرور الإدارية مطلوبة.");

            btn.disabled = true;
            for(let i=0; i<appQueue.length; i++) {
                status.style.color = "var(--text)";
                status.innerText = `⚙️ جاري إرسال لتوقيع: ${appQueue[i].name} (${i+1}/${appQueue.length})...`;
                try {
                    const res = await fetch('/api/admin', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({...appQueue[i], password: pass})
                    });
                    if(!res.ok) throw new Error();
                } catch {
                    status.style.color = "var(--danger)"; status.innerText = `❌ فشل إرسال ${appQueue[i].name}`;
                    btn.disabled = false; return;
                }
            }
            status.style.color = "var(--success)"; status.innerText = "✅ تم إرسال كل التطبيقات لخط التوقيع بنجاح!";
            appQueue = []; updateQueueUI(); btn.disabled = false;
            document.getElementById('adminPassword').value = '';
        }

        async function loadApps() {
            const container = document.getElementById('appsContainer');
            container.innerHTML = "<div style='text-align:center;'>جاري جلب التطبيقات... ⏳</div>";
            try {
                const res = await fetch('/api/manage');
                const data = await res.json();
                currentApps = data.apps || []; currentSha = data.sha;
                container.innerHTML = currentApps.map((app, i) => `
                    <div class="app-item">
                        <img src="${app.iconUrl}" onerror="this.src='https://via.placeholder.com/48'">
                        <div class="app-info"><strong>${app.name}</strong><small>${app.bundleId}</small></div>
                        <div class="app-actions">
                            <button class="btn-secondary" onclick="const n=prompt('الاسم الجديد:', '${app.name}'); if(n){currentApps[${i}].name=n;saveApps('تم التعديل');}">تعديل</button>
                            <button class="btn-danger" onclick="if(confirm('حذف؟')){currentApps.splice(${i},1);saveApps('تم الحذف');}">حذف</button>
                        </div>
                    </div>
                `).join('');
                if(currentApps.length===0) container.innerHTML = "<div style='text-align:center;color:gray;'>المتجر فارغ.</div>";
            } catch { container.innerHTML = "❌ فشل الاتصال."; }
        }

        async function saveApps(msg) {
            const pass = document.getElementById('managePassword').value;
            const status = document.getElementById('manageStatus');
            if(!pass) return alert("ادخل كلمة المرور لتأكيد الحفظ.");
            status.style.color = "var(--text)"; status.innerText = "⏳ جاري حفظ التغييرات...";
            try {
                const res = await fetch('/api/manage', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ apps: currentApps, sha: currentSha, password: pass })
                });
                if(res.ok) { status.style.color="var(--success)"; status.innerText=`✅ ${msg}`; loadApps(); }
                else throw new Error();
            } catch { status.style.color="var(--danger)"; status.innerText="❌ فشل التحديث (كلمة المرور خاطئة)."; }
        }
    </script>
</body>
</html>
