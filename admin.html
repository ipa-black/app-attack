<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنظومة الشاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white pb-20">
    
    <nav class="bg-slate-800 p-4 sticky top-0 shadow-lg z-50 flex justify-between">
        <h1 class="font-bold text-red-500">لوحة التحكم</h1>
        <div class="flex gap-2">
            <button onclick="saveChanges()" class="bg-green-600 px-4 py-1 rounded text-sm font-bold shadow hover:bg-green-500">حفظ كل التعديلات 💾</button>
        </div>
    </nav>

    <div class="p-4 max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
        
        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
            <h2 class="text-xl font-bold mb-4 text-blue-400">⚙️ إعدادات المتجر</h2>
            <div class="flex flex-col gap-3">
                <label class="text-sm">اسم الموقع (التايتل)</label>
                <input type="text" id="siteTitle" class="bg-slate-900 p-3 rounded border border-slate-700">
                
                <label class="text-sm mt-2">طريقة عرض التطبيقات</label>
                <select id="viewMode" class="bg-slate-900 p-3 rounded border border-slate-700">
                    <option value="grid">شبكة (Grid)</option>
                    <option value="swipe-x">سحب يمين/يسار (Horizontal Swipe)</option>
                    <option value="swipe-y">قائمة طولية (Vertical)</option>
                </select>

                <label class="text-sm mt-2">الأقسام (افصل بينها بفاصلة , )</label>
                <input type="text" id="categories" class="bg-slate-900 p-3 rounded border border-slate-700">
            </div>
        </div>

        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
            <h2 class="text-xl font-bold mb-4 text-blue-400">🚀 توقيع تطبيق جديد</h2>
            <div class="flex flex-col gap-3">
                <input type="url" id="newIpa" placeholder="الرابط المباشر الغير موقع (Unsigned)" class="bg-slate-900 p-3 rounded border border-slate-700 text-left" dir="ltr">
                <select id="newCategory" class="bg-slate-900 p-3 rounded border border-slate-700"></select>
                <button onclick="signNewApp()" class="bg-blue-600 p-3 rounded font-bold hover:bg-blue-500">سحب، توقيع، ونشر</button>
            </div>
        </div>
    </div>

    <div class="p-4 max-w-4xl mx-auto">
        <h2 class="text-2xl font-bold mb-4 mt-6">📱 إدارة التطبيقات الموجودة</h2>
        <div id="appsList" class="flex flex-col gap-4"></div>
    </div>

    <script>
        let storeData = null;
        let storeSha = null;

        async function loadStore() {
            const res = await fetch('/api/store');
            const data = await res.json();
            storeData = data.content;
            storeSha = data.sha;
            renderAdmin();
        }

        function renderAdmin() {
            // تحديث الإعدادات
            document.getElementById('siteTitle').value = storeData.settings.siteTitle;
            document.getElementById('viewMode').value = storeData.settings.viewMode;
            document.getElementById('categories').value = storeData.settings.categories.join(', ');

            // تحديث قائمة الأقسام في نموذج الإضافة
            const catSelect = document.getElementById('newCategory');
            catSelect.innerHTML = storeData.settings.categories.map(c => `<option value="${c}">${c}</option>`).join('');

            // تحديث قائمة التطبيقات
            const list = document.getElementById('appsList');
            list.innerHTML = '';
            
            storeData.apps.forEach((app, index) => {
                list.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-xl border ${app.isHidden ? 'border-red-500/50 opacity-60' : 'border-slate-700'} flex flex-col gap-3">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <img src="${app.appIcon}" class="w-16 h-16 rounded-xl object-cover">
                                <div>
                                    <input type="text" value="${app.appName}" onchange="updateApp(${index}, 'appName', this.value)" class="bg-transparent font-bold text-lg border-b border-slate-600 focus:outline-none">
                                    <p class="text-xs text-slate-400 font-mono mt-1">${app.bundleId}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="toggleVisibility(${index})" class="bg-slate-700 px-3 py-1 rounded text-sm">${app.isHidden ? '👁️ إظهار' : '🙈 إخفاء'}</button>
                                <button onclick="deleteApp(${index})" class="bg-red-600 px-3 py-1 rounded text-sm">🗑️ حذف</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mt-2">
                            <div>
                                <label class="text-[10px] text-slate-400">الرابط الموقّع (Signed)</label>
                                <input type="text" value="${app.ipaUrl}" onchange="updateApp(${index}, 'ipaUrl', this.value)" class="w-full bg-slate-900 p-2 rounded text-xs text-left" dir="ltr">
                            </div>
                            <div>
                                <label class="text-[10px] text-yellow-400">الرابط الخام (Unsigned) - حدّثه هنا لإعادة التوقيع</label>
                                <div class="flex gap-2">
                                    <input type="text" id="unsigned_${index}" value="${app.unsignedUrl || ''}" onchange="updateApp(${index}, 'unsignedUrl', this.value)" class="w-full bg-slate-900 p-2 rounded text-xs text-left" dir="ltr">
                                    <button onclick="reSignApp(${index})" class="bg-yellow-600 text-xs px-2 rounded hover:bg-yellow-500">إعادة توقيع</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updateApp(index, key, value) { storeData.apps[index][key] = value; }
        function toggleVisibility(index) { storeData.apps[index].isHidden = !storeData.apps[index].isHidden; renderAdmin(); }
        function deleteApp(index) { if(confirm('تأكيد الحذف؟')) { storeData.apps.splice(index, 1); renderAdmin(); } }

        async function saveChanges() {
            // تحديث الإعدادات من الحقول
            storeData.settings.siteTitle = document.getElementById('siteTitle').value;
            storeData.settings.viewMode = document.getElementById('viewMode').value;
            storeData.settings.categories = document.getElementById('categories').value.split(',').map(s => s.trim());

            const res = await fetch('/api/store', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ newContent: storeData, sha: storeSha, message: 'تحديث المتجر من لوحة التحكم' })
            });
            if(res.ok) { alert('تم الحفظ بنجاح! سيتم تحديث المتجر.'); loadStore(); }
            else { alert('حدث خطأ أثناء الحفظ.'); }
        }

        async function signNewApp() {
            const url = document.getElementById('newIpa').value;
            const cat = document.getElementById('newCategory').value;
            if(!url) return alert('ضع الرابط أولاً');
            await fetch('/api/sign', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ipa_url: url, category: cat }) });
            alert('تم إرسال أمر التوقيع لـ GitHub! سيتم التحديث قريباً.');
        }

        async function reSignApp(index) {
            const url = document.getElementById(`unsigned_${index}`).value;
            const cat = storeData.apps[index].category || storeData.settings.categories[0];
            await fetch('/api/sign', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ipa_url: url, category: cat }) });
            alert('تم إرسال أمر إعادة التوقيع للرابط الجديد!');
        }

        loadStore();
    </script>
</body>
</html>
